<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist</title>
<style>
  :root {
    --bg1: #ff6b6b;
    --bg2: #4ecdc4;
    --bg3: #ffe66d;
    --bg4: #a06cd5;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, var(--bg1), var(--bg4) 40%, var(--bg2) 70%, var(--bg3));
    background-size: 300% 300%;
    animation: gradientShift 18s ease infinite;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: rgba(255, 255, 255, 0.92);
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    padding: 28px 24px 32px;
    backdrop-filter: blur(6px);
  }
  .auth-card {
    text-align: center;
  }
  .auth-card h2 {
    margin-top: 0;
    color: #2d2d2d;
  }
  .auth-card p {
    color: #888;
    font-size: 0.9rem;
  }
  #signInBtn {
    margin-top: 10px;
    padding: 12px 22px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #ff6b6b, #a06cd5);
    color: #fff;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(0,0,0,0.2);
  }
  #signInBtn:hover { transform: translateY(-1px); }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
    font-size: 0.75rem;
    color: #999;
  }
  #signOutBtn {
    background: none;
    border: none;
    color: #a06cd5;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.75rem;
    padding: 0;
  }
  #syncStatus {
    text-align: center;
    font-size: 0.7rem;
    color: #bbb;
    margin-top: 4px;
  }
  #title {
    font-size: 1.8rem;
    font-weight: 800;
    text-align: center;
    border: none;
    outline: none;
    width: 100%;
    background: transparent;
    color: #2d2d2d;
    padding: 6px 4px;
    border-radius: 10px;
    transition: background 0.2s;
  }
  #title:hover, #title:focus {
    background: rgba(0,0,0,0.05);
  }
  .subtitle {
    text-align: center;
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 20px;
  }
  #list {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 14px;
    color: #fff;
    font-weight: 600;
    box-shadow: 0 4px 10px rgba(0,0,0,0.12);
    transition: transform 0.15s, opacity 0.15s;
    animation: pop 0.25s ease;
  }
  @keyframes pop {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .item:hover { transform: translateY(-2px); }
  .item.done {
    opacity: 0.55;
  }
  .item.done .item-text {
    text-decoration: line-through;
  }
  .checkbox {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border-radius: 50%;
    border: 2.5px solid rgba(255,255,255,0.85);
    background: rgba(255,255,255,0.15);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .item.done .checkbox {
    background: rgba(255,255,255,0.9);
    color: #333;
  }
  .item-text {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: inherit;
    font: inherit;
    min-width: 0;
  }
  .item-text::placeholder { color: rgba(255,255,255,0.75); }
  .color-dot {
    width: 16px;
    height: 16px;
    min-width: 16px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.7);
    flex-shrink: 0;
  }
  .delete-btn {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.85);
    font-size: 1.1rem;
    cursor: pointer;
    padding: 0 2px;
    flex-shrink: 0;
    line-height: 1;
  }
  .delete-btn:hover { color: #fff; }
  #addBtn {
    display: block;
    margin: 22px auto 0;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #ff6b6b, #a06cd5);
    color: #fff;
    font-size: 1.8rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    transition: transform 0.15s;
  }
  #addBtn:hover { transform: scale(1.08) rotate(90deg); }
  #addBtn:active { transform: scale(0.95); }
  .empty-msg {
    text-align: center;
    color: #999;
    font-size: 0.9rem;
    padding: 20px 0;
  }
  .progress-wrap {
    margin-top: 18px;
    height: 8px;
    border-radius: 4px;
    background: rgba(0,0,0,0.08);
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #ff6b6b, #ffe66d, #4ecdc4, #a06cd5);
    background-size: 300% 100%;
    animation: gradientShift 6s ease infinite;
    transition: width 0.3s ease;
    width: 0%;
  }
  .progress-label {
    text-align: center;
    font-size: 0.75rem;
    color: #999;
    margin-top: 6px;
  }
</style>
</head>
<body>

  <div id="authScreen" class="card auth-card">
    <h2>Colorful Checklist</h2>
    <p>Sign in with Google to save your list and sync it across devices.</p>
    <button id="signInBtn">Sign in with Google</button>
  </div>

  <div id="appCard" class="card" style="display:none;">
    <div class="top-bar">
      <span id="userEmail"></span>
      <button id="signOutBtn">Sign out</button>
    </div>

    <input id="title" type="text" value="My Checklist" spellcheck="false" />
    <div class="subtitle">click the title to rename it</div>

    <ul id="list"></ul>
    <p id="emptyMsg" class="empty-msg" style="display:none;">Nothing here yet — tap + to add an item</p>

    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-label" id="progressLabel">0 of 0 complete</div>

    <button id="addBtn" title="Add item">+</button>
    <div id="syncStatus">synced</div>
  </div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  // =====================================================================
  // STEP: paste your Firebase project config here (see deploy guide).
  // Firebase Console > Project settings > General > Your apps > Web app
  // =====================================================================
const firebaseConfig = {
  apiKey: "AIzaSyBzuJs6iEo4JF5pokcBu2FE0R-e7uircs8",
  authDomain: "checklist-c3618.firebaseapp.com",
  projectId: "checklist-c3618",
  storageBucket: "checklist-c3618.firebasestorage.app",
  messagingSenderId: "65621254991",
  appId: "1:65621254991:web:19e2932e943041c543db3a",
  measurementId: "G-V7J2JR85BG"
};
  // =====================================================================

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const provider = new firebase.auth.GoogleAuthProvider();

  const COLORS = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#a06cd5', '#ff9f43', '#54a0ff', '#1dd1a1', '#f368e0'];

  const listEl = document.getElementById('list');
  const titleEl = document.getElementById('title');
  const addBtn = document.getElementById('addBtn');
  const emptyMsg = document.getElementById('emptyMsg');
  const progressBar = document.getElementById('progressBar');
  const progressLabel = document.getElementById('progressLabel');
  const authScreen = document.getElementById('authScreen');
  const appCard = document.getElementById('appCard');
  const userEmailEl = document.getElementById('userEmail');
  const syncStatusEl = document.getElementById('syncStatus');

  let state = { title: 'My Checklist', items: [] };
  let currentUser = null;
  let unsubscribeSnapshot = null;
  let saveTimeout = null;
  let suppressNextRenderSave = false;

  function id() {
    return Math.random().toString(36).slice(2, 10);
  }

  // ---- Auth ----
  document.getElementById('signInBtn').addEventListener('click', () => {
    auth.signInWithPopup(provider).catch(err => alert('Sign-in failed: ' + err.message));
  });

  document.getElementById('signOutBtn').addEventListener('click', () => {
    auth.signOut();
  });

  auth.onAuthStateChanged(user => {
    currentUser = user;
    if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }

    if (user) {
      authScreen.style.display = 'none';
      appCard.style.display = 'block';
      userEmailEl.textContent = user.email || '';
      subscribeToChecklist(user.uid);
    } else {
      authScreen.style.display = 'block';
      appCard.style.display = 'none';
    }
  });

  // ---- Firestore sync ----
  function subscribeToChecklist(uid) {
    const docRef = db.collection('checklists').doc(uid);
    unsubscribeSnapshot = docRef.onSnapshot(snap => {
      if (snap.exists) {
        const data = snap.data();
        state = { title: data.title || 'My Checklist', items: data.items || [] };
      } else {
        state = { title: 'My Checklist', items: [] };
        docRef.set(state);
      }
      syncStatusEl.textContent = 'synced';
      render();
    }, err => {
      console.error(err);
      syncStatusEl.textContent = 'sync error — check console';
    });
  }

  function saveToFirestore() {
    if (!currentUser) return;
    syncStatusEl.textContent = 'saving…';
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
      db.collection('checklists').doc(currentUser.uid).set(state)
        .then(() => { syncStatusEl.textContent = 'synced'; })
        .catch(err => { console.error(err); syncStatusEl.textContent = 'sync error — check console'; });
    }, 400);
  }

  // ---- Rendering ----
  function render() {
    titleEl.value = state.title;
    listEl.innerHTML = '';
    emptyMsg.style.display = state.items.length ? 'none' : 'block';

    state.items.forEach(item => {
      const li = document.createElement('li');
      li.className = 'item' + (item.done ? ' done' : '');
      li.style.background = item.color;

      const checkbox = document.createElement('div');
      checkbox.className = 'checkbox';
      checkbox.textContent = item.done ? '✓' : '';
      checkbox.title = 'Toggle done';
      checkbox.addEventListener('click', () => {
        item.done = !item.done;
        saveToFirestore();
        render();
      });

      const text = document.createElement('input');
      text.className = 'item-text';
      text.type = 'text';
      text.value = item.text;
      text.placeholder = 'List item...';
      text.addEventListener('input', () => {
        item.text = text.value;
        saveToFirestore();
      });

      const colorDot = document.createElement('div');
      colorDot.className = 'color-dot';
      colorDot.style.background = '#fff';
      colorDot.title = 'Change color';
      colorDot.addEventListener('click', () => {
        const idx = COLORS.indexOf(item.color);
        item.color = COLORS[(idx + 1) % COLORS.length];
        saveToFirestore();
        render();
      });

      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.textContent = '✕';
      del.title = 'Delete item';
      del.addEventListener('click', () => {
        state.items = state.items.filter(i => i.id !== item.id);
        saveToFirestore();
        render();
      });

      li.appendChild(checkbox);
      li.appendChild(text);
      li.appendChild(colorDot);
      li.appendChild(del);
      listEl.appendChild(li);
    });

    const total = state.items.length;
    const doneCount = state.items.filter(i => i.done).length;
    progressBar.style.width = total ? `${(doneCount / total) * 100}%` : '0%';
    progressLabel.textContent = `${doneCount} of ${total} complete`;
  }

  titleEl.addEventListener('input', () => {
    state.title = titleEl.value;
    saveToFirestore();
  });

  addBtn.addEventListener('click', () => {
    const color = COLORS[state.items.length % COLORS.length];
    state.items.push({ id: id(), text: '', done: false, color });
    saveToFirestore();
    render();
    const inputs = listEl.querySelectorAll('.item-text');
    const last = inputs[inputs.length - 1];
    if (last) last.focus();
  });

  render();
</script>
</body>
</html>
